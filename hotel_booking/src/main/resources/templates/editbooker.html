<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit booker</title>
</head>
<body>
    <h2>Update booker</h2>
      
        <div>
            <form method="post" action="#" th:action="@{/bookerupdate}" th:object="${bookers}">

             <input type="hidden" th:field="*{bookerId}"/>

                <p>Araving: <input type="date" th:field="*{araiving}"/></p>
                <p>Leaving: <input type="date" th:field="*{leaving}"/></p>
                <p>Price: <input type="number" th:field="*{price}"/></p>
                <p>People coming: <input type="text" th:field="*{peopleComing}"/></p>
                <p>Name: <input type="text" th:field="*{name}"/></p>
                <input type="submit" value="Submit" /> 
            </form>
        </div>
</body>
</html>
