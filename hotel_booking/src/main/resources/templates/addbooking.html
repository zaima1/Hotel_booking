<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"  xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add booking</title>
</head>
<body>
    <h1>Add Booking</h1>
        <div>
            <form method="post" action="#" th:action="@{/savebooking}" th:object="${booking}">
                <p>Arriving: <input type="date" th:field="*{arriving}"/></p>
                <p> Leaving: <input type="date" th:field="*{leaving}"/></p>
                <p>Price: <input type="number" th:field="*{price}"/></p>
                <p>Amount of people: <input type="number" th:field="*{peopleComing}"/></p>
                   <select>
                    <label>Booker last name:</label>
                        <option th:each="book: ${booker}" 
                            th:value="${book}" 
                            th:text="${book.lastName}"></option>
                     </select>
               
                <input type="submit" value="Submit" /> <input type="reset" value="Reset" />
            </form>
        </div>
</body>
</html>
