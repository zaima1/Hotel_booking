<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add hotel</title>
</head>

<body>
    <h1>Add Hotel</h1>
    <div>
        <form method="post" action="#" th:action="@{/savehotel}" th:object="${hotel}">
            <p>Room amount: <input type="number" th:field="*{roomAmount}" /></p>
            <p>Address: <input type="text" th:field="*{address}" /></p>
            <p> City: <input type="text" th:field="*{city}" /></p>
            <p>Postcode: <input type="text" th:field="*{postcode}" /></p>
            <p>Stars: <input max="5" type="number" th:field="*{stars}" /></p>


            <input type="submit" value="Submit" /> <input type="reset" value="Reset" />
        </form>
    </div>
</body>

</html>
