<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"  xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Booker</title>
</head>
<body>
    <h1>Add Booker</h1>
        <div>
            <form method="post" action="#" th:action="@{/savebooker}" th:object="${booker}">
                    <p>First name: <input type="text" th:field="*{firstName}"/></p>
                    <p>Last name: <input type="text" th:field="*{lastName}"/></p>
                    <label >Beds in room:</label>
                     <select>
                        <option th:each="ro: ${room}" 
                            th:value="${ro}" 
                            th:text="${ro.beds}"></option>
                     </select>
                    
                </div>
               
                <input type="submit" value="Submit" /> <input type="reset" value="Reset" />
            </form>
        </div>
</body>
</html>
